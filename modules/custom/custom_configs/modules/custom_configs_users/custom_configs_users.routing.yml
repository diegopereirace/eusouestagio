custom_configs_users.candidato_registration:
  path: '/cadastro/candidato'
  defaults:
    _title: 'Cadastro de candidato'
    _form: '\Drupal\custom_configs_users\Form\CandidatoRegistrationForm'
  requirements:
    _user_is_logged_in: 'FALSE'

custom_configs_users.candidato_perfil:
  path: '/meu-perfil'
  defaults:
    _title: 'Meu Perfil'
    _controller: '\Drupal\custom_configs_users\Controller\CandidatoPerfilController::view'
  requirements:
    _user_is_logged_in: 'TRUE'

custom_configs_users.empresa_registration:
  path: '/cadastro/empresa'
  defaults:
    _title: 'Cadastro de empresa'
    _form: '\Drupal\custom_configs_users\Form\EmpresaRegistrationForm'
  requirements:
    _user_is_logged_in: 'FALSE'

custom_configs_users.empresa_perfil:
  path: '/admin/perfil/empresa'
  defaults:
    _title: 'Perfil da Empresa'
    _controller: '\Drupal\custom_configs_users\Controller\EmpresaPerfilController::view'
  requirements:
    _role: 'empresa'

custom_configs_users.candidato_alterar_senha:
  path: '/painel/estudante/alterar-senha'
  defaults:
    _title: 'Alterar Senha'
    _form: '\Drupal\custom_configs_users\Form\AlterarSenhaForm'
  requirements:
    _user_is_logged_in: 'TRUE'

custom_configs_users.empresa_alterar_senha:
  path: '/painel/empresa/alterar-senha'
  defaults:
    _title: 'Alterar Senha'
    _form: '\Drupal\custom_configs_users\Form\AlterarSenhaForm'
  requirements:
    _role: 'empresa'
