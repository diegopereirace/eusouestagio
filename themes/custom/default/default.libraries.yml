global-styling:
  version: VERSION
  js:
    assets/js/global.js: {}
  css:
    component:
      assets/css/style.css: {}
bootstrap:
  js:
    /libraries/popper/popper.min.js: { weight: -19 }
    /libraries/bootstrap/js/bootstrap.min.js: { weight: -20 }
  css:
    component:
      /libraries/bootstrap/css/bootstrap.min.css: {}
  dependencies:
    - core/popperjs
fontawesome:
  css:
    component:
      /libraries/fontawesome/css/all.min.css: {}
  js:
    /libraries/fontawesome/js/all.min.js: {}

block_breakpoint:
