    assets/js/block_breakpoint.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
    - core/once
jquery_mask:
  js:
    /libraries/jquery-mask/jquery.mask.min.js: {}
  dependencies:
    - core/jquery
masks:
  js:
    assets/js/masks.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/once
    - core/drupalSettings
    - default/jquery_mask
